# agents-service-v2 · 安全部署（与 Cursor 规则、手动脚本一致）
#
# 自动部署：push 到 main 且变更命中 paths 时部署；亦可手动「Run workflow」。
# 本地手动：cd agents-service-v2 && bash scripts/deploy-safe.sh
# 回滚：ssh root@47.100.96.30 '/opt/scripts/deploy-rollback.sh'
#
# Secrets: ECS_SSH_PRIVATE_KEY（必填）；可选 ECS_HOST（默认 root@47.100.96.30）
# 仓库（若拆仓独立发布）：https://github.com/davidatjfs-cyber/agents-service-v2
#
# ── 若「从未自动部署」，请逐项核对 ──
# 1) 本文件必须在「Git 根目录」.github/workflows/ 下（子目录 agents-service-v2/.github/ 不会被 GitHub 执行）。
# 2) GitHub → Settings → Secrets and variables → Actions → 已添加 ECS_SSH_PRIVATE_KEY。
# 3) Actions 未被禁用；push 命中 paths（agents-service-v2/**）或用手动 workflow_dispatch。
# 4) 若仓库根目录只有 agents-service-v2 且无外层 HRMS，用 agents-service-v2/.github/workflows/deploy-ecs.yml
#    并把其内容挪到仓库根 .github/workflows/（或单独拆仓后保留该路径）。
name: safe-deployment

on:
  workflow_dispatch:
    inputs:
      deploy_ecs:
        description: '部署到 ECS（需 ECS_SSH_PRIVATE_KEY）'
        type: boolean
        default: true
  push:
    branches:
      - main
    paths:
      - 'agents-service-v2/**'
      - '.github/workflows/safe-deployment.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify agents-service-v2
        run: bash agents-service-v2/scripts/verify-agents-local.sh

  deploy-ecs:
    needs: verify
    if: >-
      needs.verify.result == 'success' &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.deploy_ecs == true) ||
        github.event_name == 'push'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup SSH and run deploy-safe.sh
        env:
          ECS_SSH_PRIVATE_KEY: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          ECS_HOST: ${{ secrets.ECS_HOST }}
        run: |
          set -euo pipefail
          if [ -z "${ECS_SSH_PRIVATE_KEY:-}" ]; then
            echo "::error::缺少 Secret ECS_SSH_PRIVATE_KEY"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$ECS_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          HOSTPORT="${ECS_HOST:-root@47.100.96.30}"
          H="${HOSTPORT##*@}"
          ssh-keyscan -H "$H" 2>/dev/null >> ~/.ssh/known_hosts || true
          export ECS_HOST="$HOSTPORT"
          bash agents-service-v2/scripts/deploy-safe.sh
