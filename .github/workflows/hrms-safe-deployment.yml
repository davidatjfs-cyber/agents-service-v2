# hr-management-system · 安全部署（与 Cursor 规则、手动脚本一致）
#
# 自动部署已关闭：仅可在 GitHub Actions 里手动「Run workflow」触发。
# 本地手动：cd hr-management-system && bash scripts/deploy-hrms-safe.sh
# 根目录一键：bash scripts/deploy-hrms-server-ecs.sh（仅服务端）+ scripts/deploy-hrms-frontend.sh（前端）
# 回滚：ssh root@47.100.96.30 '/opt/scripts/deploy-rollback.sh'
# 部署前远端备份：HRMS_BACKUP_BEFORE_DEPLOY=1（默认）→ /opt/deploy-backups/hrms/hrms_<时间>.tar.gz
# HRMS_DEPLOY_REQUIRE_BACKUP=0 可放宽；健康失败时远端尝试用该 tar 回滚后再退出非 0。
#
# 数据加固（2026-04）：启动执行 migrations/014（employee_attendance_records、hrms_payroll_domain）；
# 备份见 server/backup.sh（critical 含上述表）。详见 scripts/CURSOR_DEPLOYMENT_GUIDE.md。
#
# Secrets: ECS_SSH_PRIVATE_KEY（必填）；可选 ECS_HOST（默认 root@47.100.96.30）
# 仓库（若拆仓独立发布）：https://github.com/davidatjfs-cyber/hr-management-system
name: hrms-safe-deployment

on:
  workflow_dispatch:
    inputs:
      deploy_ecs:
        description: '部署到 ECS（需 ECS_SSH_PRIVATE_KEY）'
        type: boolean
        default: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax check (server)
        run: |
          node --check hr-management-system/server/index.js
          node --check hr-management-system/server/agents.js
          node --check hr-management-system/server/bi-weekly-report.js
      - name: Migrations present (014 attendance + payroll domain)
        run: |
          test -f hr-management-system/server/migrations/014_employee_attendance_payroll_domain.sql
      - name: Frontend entry files
        run: |
          test -f hr-management-system/working-fixed.html
          test -f hr-management-system/mobile-nav-production.html
          test -f hr-management-system/sw.js
          test -f hr-management-system/forecast.html
      - name: Smart assistant and mobile nav integrity
        run: |
          rg -n 'mobile-nav-label">档案<' hr-management-system/mobile-nav-production.html
          rg -n 'mobile-nav-label">日报<' hr-management-system/mobile-nav-production.html
          rg -n 'mobile-nav-label">报表<' hr-management-system/mobile-nav-production.html
          rg -n 'mobile-nav-label">数据中心<' hr-management-system/mobile-nav-production.html
          rg -n 'mobile-nav-label">更多<' hr-management-system/mobile-nav-production.html
          rg -n '<span>知识库</span>' hr-management-system/mobile-nav-production.html
          rg -n '<span>智能助手</span>' hr-management-system/mobile-nav-production.html
          rg -n 'openMobileSmartAssistantBridge' hr-management-system/mobile-nav-production.html
          rg -n '自动读取 sales_raw|刷新 sales_raw 样本' hr-management-system/working-fixed.html

  deploy-ecs:
    needs: verify
    if: >-
      needs.verify.result == 'success' &&
      github.event_name == 'workflow_dispatch' &&
      inputs.deploy_ecs == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup SSH and run deploy-hrms-safe.sh
        env:
          ECS_SSH_PRIVATE_KEY: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          ECS_HOST: ${{ secrets.ECS_HOST }}
        run: |
          set -euo pipefail
          if [ -z "${ECS_SSH_PRIVATE_KEY:-}" ]; then
            echo "::error::缺少 Secret ECS_SSH_PRIVATE_KEY"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$ECS_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          HOSTPORT="${ECS_HOST:-root@47.100.96.30}"
          H="${HOSTPORT##*@}"
          ssh-keyscan -H "$H" 2>/dev/null >> ~/.ssh/known_hosts || true
          export ECS_HOST="$HOSTPORT"
          bash hr-management-system/scripts/deploy-hrms-safe.sh
